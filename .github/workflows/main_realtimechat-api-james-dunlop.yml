name: Build and Deploy API

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: realtime-chat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          pwd
          find . -name "*.csproj"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore server/RealTimeChat.Api/RealTimeChat.Api.csproj

      - name: Build
        run: dotnet build server/RealTimeChat.Api/RealTimeChat.Api.csproj --configuration Release

      - name: Publish
        run: dotnet publish server/RealTimeChat.Api/RealTimeChat.Api.csproj -c Release -o ../publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: publish
